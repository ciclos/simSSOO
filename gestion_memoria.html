    <div class="contenedor-dialogo">
        <div class="contenido" id="add-proceso">
            <button class="cerrar" onclick="cerrar('add-proceso')">X</button>
            <h1>Añadir contenido</h1>

            <div class="box-select">
                <label for="">Seleciona el contenido a crear</label>
                <select name="tipo" id="tipo">
                    <option value="" selected disabled>Seleciona el tipo</option>
                    <option value="Memoria">Memoria</option>
                    <option value="Proceso">Proceso</option>
                </select>
            </div>

            <div class="formulario-modal">

                <div class="grupo-input">
                    <label for="">
                        Nombre

                    </label>
                    <input type="text" id="name-process" placeholder="Nombre">
                </div>

                <div class="grupo-input">
                    <label for="">
                        Tamaño

                    </label>
                    <input type="number" id="size-process" placeholder="Tamaño" min="1" max="5">
                </div>

                <button id="create" >OK!</button>
            </div>
        </div>
    </div>

    <h1 class="titulo">GESTION MEMORIA</h1>

    <div class="main-container">
        <div class="contenedor-procesos">
            <h1 class="titulo">Procesos preparados</h1>
            <div class="procesos_preparados" id="procesos">

                <div class="proceso size1" draggable="true" id="p1">

                    <div class="info-izq ">
                        <span>

                        </span>

                    </div>
                </div>

                <div class="proceso size2" draggable="true" id="p2">
                    <div class="info-izq ">
                        <span>

                        </span>

                    </div>

                    <div class="nombre-proceso">
                        <p>Chrome</p>
                    </div>
                </div>

                <div class="button-container">
                    <button class="button" onclick="mostrarModal('add-proceso')" id="show-button">+</button>
                </div>

            </div>


        </div>

        <div class="contenedor-instruciones">
            <h1 class="titulo">Tamaño de las Instruciones</h1>
            <div class="instruciones">
                <span>32bits</span>
            </div>
        </div>

        <div class="contenedor-particiones">
            <h1 class="titulo">Memoria principal</h1>

            <div class="mi_memoria" id="contenedor-memoria">
                <div class="particion size1 tooltip">
                    <div class="info-izq fuera">
                        <span>

                        </span>
                    </div>
                    <span class="tooltiptext_derecha">
                        Memoria disponible: 1.5MB
                    </span>
                    <div class="pestana-derecha"></div>
                </div>

                <div class="particion size2 tooltip">
                    <div class="info-izq fuera">
                        <span>

                        </span>
                    </div>
                    <span class="tooltiptext_derecha">
                        Memoria disponible: 1.5MB
                    </span>
                    <div class="pestana-derecha"></div>
                </div>

                <div class="button-container">
                    <button class="button" onclick="mostrarModal('add-proceso')">+</button>
                </div>
            </div>
        </div>
    </div>
    <div class="alerta">
        <p>El proceso es demasiado grande</p>
    </div>
